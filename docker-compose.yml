services:
  # ── Shared database for Python microservices (lingo-db) ──────────────────────
  db:
    image: postgres:16-alpine
    container_name: lingo-auth-db
    environment:
      POSTGRES_USER: lingo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lingo}
      POSTGRES_DB: lingo_db
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lingo -d lingo_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lingo-net
    restart: unless-stopped

  # ── Quest Service (8001) ─────────────────────────────────────────────────────
  quest-service:
    build:
      context: .
      dockerfile: quest-service/Dockerfile
    container_name: lingo-quest-service
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lingo:${DB_PASSWORD:-lingo}@db:5432/lingo_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lingo-net
    volumes:
      - ./quest-service:/app
    restart: unless-stopped

  # ── Card Service (8002) ──────────────────────────────────────────────────────
  card-service:
    build:
      context: .
      dockerfile: card-service/Dockerfile
    container_name: lingo-card-service
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lingo:${DB_PASSWORD:-lingo}@db:5432/lingo_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lingo-net
    volumes:
      - ./card-service:/app
    restart: unless-stopped

  # ── Challenge Service (8003) ─────────────────────────────────────────────────
  challenge-service:
    build: ./challenge-service
    container_name: lingo-challenge-service
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lingo:${DB_PASSWORD:-lingo}@db:5432/lingo_db
      QUEST_SERVICE_URL: http://quest.localhost
      CARD_SERVICE_URL: http://card.localhost
    depends_on:
      db:
        condition: service_healthy
      quest-service:
        condition: service_started
    networks:
      - lingo-net
    volumes:
      - ./challenge-service:/app
    restart: unless-stopped

  # ── Game Backend (4000) ──────────────────────────────────────────────────────
  game-backend:
    build:
      context: ./game-backend
      dockerfile: Dockerfile
    container_name: lingo-game-backend
    env_file:
      - ./game-backend/.env.docker
    environment:
      AUTH_SERVICE_URL: http://auth.localhost/api
    ports:
      - "4000:4000"
    depends_on:
      quest-service:
        condition: service_started
      card-service:
        condition: service_started
      challenge-service:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - lingo-net
    restart: unless-stopped

  # ── Frontend (Nginx + Vite build) ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lingo-frontend
    ports:
      - "5173:80"
    depends_on:
      game-backend:
        condition: service_started
    # Allows Nginx to reach host services like backend on port 3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lingo-net
    restart: unless-stopped

  # ── Backend Postgres for Node auth API (5434) ────────────────────────────────
  backend-db:
    image: postgres:17.4
    container_name: lingo_backend_auth_db
    restart: always
    environment:
      TZ: Europe/Helsinki
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: projectdb
    ports:
      - "5434:5432" # backend/.env expects DB_PORT=5434, DB_HOST=localhost
    volumes:
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backend/db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d projectdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lingo-net

  # ── Node Auth Backend (3000) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lingo-auth-backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: backend-db
      DB_PORT: 5432
    ports:
      - "3000:3000"
    depends_on:
      backend-db:
        condition: service_healthy
    networks:
      - lingo-net
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════════════════════
  # MONITORING STACK
  # ════════════════════════════════════════════════════════════════════════════

  # ── Prometheus — metrics scraper ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: lingo-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - lingo-net
    restart: unless-stopped

  # ── Loki — log aggregation ────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    container_name: lingo-loki
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - lingo-net
    restart: unless-stopped

  # ── Promtail — ships Docker container logs to Loki ───────────────────────────
  promtail:
    image: grafana/promtail:3.1.0
    container_name: lingo-promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - lingo-net
    restart: unless-stopped

  # ── Grafana — dashboards UI ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: lingo-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=lingodeck
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://grafana.localhost
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"    # host 3001 to avoid clash with backend's 3000
    depends_on:
      - prometheus
      - loki
    networks:
      - lingo-net
    restart: unless-stopped

volumes:
  db-data:
  prometheus-data:
  loki-data:
  grafana-data:

networks:
  lingo-net:
    driver: bridge

